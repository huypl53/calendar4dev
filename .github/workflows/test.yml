# E2E Test Pipeline
# Generated by BMad TEA Agent - Test Architect Module
# Stack: fullstack | Framework: Playwright
#
# Stages: test (parallel shards) → burn-in (flaky detection) → report
# Unit tests, lint, typecheck handled by ci.yml

name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly burn-in on Sundays at 2 AM UTC
    - cron: "0 2 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  # E2E test stage - Parallel execution with sharding
  test:
    name: E2E (Shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run E2E tests (shard ${{ matrix.shard }}/4)
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/4 --project=chromium

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-shard-${{ matrix.shard }}
          path: |
            test-results/
            playwright-report/
          retention-days: 30

  # Burn-in stage - Flaky test detection
  burn-in:
    name: Burn-In (Flaky Detection)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: test
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright system deps
        run: npx playwright install-deps chromium

      - name: Detect changed E2E test files
        id: changed-tests
        run: |
          CHANGED_SPECS=$(git diff --name-only origin/main...HEAD -- 'playwright/e2e/**' | grep -E '\.(spec|test)\.(ts|js)$' || echo "")
          if [ -n "$CHANGED_SPECS" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Found changed E2E specs:"
            echo "$CHANGED_SPECS"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changed E2E specs found"
          fi

      - name: Run burn-in on changed specs (10 iterations)
        if: steps.changed-tests.outputs.has_changes == 'true'
        run: |
          echo "Starting burn-in loop - detecting flaky tests"
          for i in {1..10}; do
            echo "Burn-in iteration $i/10"
            pnpm exec playwright test --project=chromium || exit 1
          done
          echo "Burn-in complete - no flaky tests detected"

      - name: Run full burn-in (scheduled)
        if: github.event_name == 'schedule'
        run: |
          echo "Weekly scheduled burn-in"
          for i in {1..10}; do
            echo "Burn-in iteration $i/10"
            pnpm exec playwright test --project=chromium || exit 1
          done
          echo "Weekly burn-in complete"

      - name: Upload burn-in failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: burn-in-failures
          path: |
            test-results/
            playwright-report/
          retention-days: 30

  # Report stage - Aggregate results
  report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: [test, burn-in]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
        continue-on-error: true

      - name: Generate summary
        run: |
          echo "## E2E Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stage | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| E2E Tests (4 shards) | ${{ needs.test.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Burn-In | ${{ needs.burn-in.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ needs.burn-in.result }}" == "failure" ]; then
            echo "> **Warning:** Flaky tests detected - review burn-in artifacts" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Quality gate
        if: needs.test.result == 'failure'
        run: |
          echo "Quality gate FAILED: E2E tests did not pass"
          exit 1
